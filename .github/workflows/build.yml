name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        # Мы добавили перенаправление ошибок, чтобы они были заметнее
        run: gradle assembleDebug > log.txt 2>&1 || (tail -n 100 log.txt && exit 1)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CF-Stats-App
          path: app/build/outputs/apk/debug/*.apk
