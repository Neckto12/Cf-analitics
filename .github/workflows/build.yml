name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4 # Обновили с v3 на v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4 # Обновили с v3 на v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3 # Используем актуальный экшен для Gradle

    - name: Build APK
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4 # ТА САМАЯ ОШИБКА: обновили v3 на v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
